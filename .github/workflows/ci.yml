# This is a basic workflow to help you get started with Actions

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

  workflow_dispatch:

jobs:
  next:
    name: Next.js Lint, Format and Build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      TZ: "Asia/Tokyo"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          run_install: true

      - name: Lint
        run: pnpm lint

      - name: Format
        run: pnpm format

      - name: Build
        run: pnpm build
